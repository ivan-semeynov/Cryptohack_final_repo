version: "3.9"

services:
  catalyst-risk-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalyst-risk-api
    ports:
      - "8000:8000"
    environment:
      MODEL_DIR: /app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
